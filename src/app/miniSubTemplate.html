<style>
  html, body, .app-shell {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
  }
  
  .app-shell {
    display: flex;
    flex-direction: column;
    background: #f8fafc;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    height: 60px;
    box-sizing: border-box;
  }
  .topbar h1 { margin: 0; font-size: 20px; }
  .topbar p.eyebrow { margin: 0; font-size: 11px; color: #64748b; text-transform: uppercase; }

  .workspace-layout {
    display: grid;
    grid-template-columns: 1fr 35vw; 
    height: calc(100vh - 60px);
    overflow: hidden;
  }

  .workspace-pane {
    display: flex;
    flex-direction: column;
    border-right: 1px solid #cbd5e1;
    height: 100%;
  }
  
  .toolbar {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 10px;
  }

  #blocklyWorkspace {
    flex: 1;
    width: 100%;
  }

  .right-sidebar {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: #f1f5f9;
    overflow: hidden;
  }

  .trace-pane {
    height: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
    border-bottom: 2px solid #cbd5e1;
  }

  .trace-entries {
    flex: 1;
    overflow-y: auto; 
    padding: 10px;
    background: #fafafa;
  }
  
  #traceEntries > * {
    flex-shrink: 0 !important;
    min-height: auto !important;
  }

  .simulator-panel {
    background: #fff;
    display: flex;
    flex-direction: column;
    height: 45%; 
    flex-shrink: 0;
    overflow: hidden;
  }

  #simulatorCanvas {
    display: block;
    background: #0284c7;
    width: 100%;
    flex: 1; 
  }
</style>

<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">MiniSub</p>
      <h1>Blockly Console</h1>
    </div>
    <div class="endpoint-pill" style="background: #e2e8f0; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-family: monospace;">POST http://192.168.4.1/api/v1/command</div>
  </header>

  <section class="workspace-layout">
    <div class="workspace-pane">
      <div class="toolbar">
        <div class="toolbar-row" style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;"> 
          <button id="launchMissionButton" class="primary-button" type="button" style="background: #0284c7; color: #fff; font-weight: bold; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;">Launch mission</button>
          <button id="runSelectedButton" class="secondary-button" type="button" disabled>Run selected</button>
          <button id="clearWorkspaceButton" class="secondary-button" type="button">Clear board</button>
          <button id="saveWorkspaceButton" class="secondary-button" type="button">Save blocks</button>
          <button id="loadWorkspaceButton" class="secondary-button" type="button">Load blocks</button>
          <button id="saveMissionButton" class="secondary-button" type="button">Save mission</button>
          <button id="loadMissionButton" class="secondary-button" type="button">Load mission</button>
          <select id="missionSelect" style="padding: 8px; background: #e8ecef; color: black; border-radius: 8px;">
            <option value="1">Mission 1: Open Ocean</option>
            <option value="2">Mission 2: The Coral Maze</option>
            <option value="3">Mission 3: The Deep Cave</option>
            <option value="4">Mission 4: Unknown</option>
          </select>
        </div>

        <div style="display: inline-flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 4px 10px; border-radius: 20px; border: 1px solid #cbd5e1;">
          <span style="font-size: 12px; font-weight: 600; color: #000;">Simulator</span>
          <label class="switch-container" style="position: relative; display: inline-block; width: 34px; height: 20px; margin: 0;">
            <input type="checkbox" id="execTargetToggle" style="opacity: 0; width: 0; height: 0;">
            <span class="switch-slider"></span>
          </label>
          <span style="font-size: 12px; font-weight: 600; color: #000;">Submarine</span>
        </div>
      </div>
      
      <div id="blocklyWorkspace"></div>
    </div>

    <div class="right-sidebar">
      <aside class="trace-pane" aria-label="Execution trace">
        <div style="padding: 8px 12px; border-bottom: 1px solid #e2e8f0; background: #f8fafc;">
          <h2 style="margin: 0; font-size: 13px; color: #334155;">Execution Trace</h2>
          <button id="clearTraceButton" class="secondary-button" type="button">Clear trace</button>
        </div>
        <div id="traceEntries" class="trace-entries"></div>
      </aside>

      <div class="simulator-panel">
        <div style="background: #f8fafc; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; border-top: 1px solid #e2e8f0;">
          <div style="display: flex; gap: 6px; align-items: center;">
            <button id="startButton" class="quarternary-button" type="button" style="padding: 4px 10px; font-size: 12px;">Start</button>
            <button id="pauseButton" class="secondary-button" type="button" style="padding: 4px 10px; font-size: 12px;" disabled>Pause</button>
            <button id="stepButton" class="secondary-button" type="button" style="padding: 4px 10px; font-size: 12px;">Step</button>
            <button id="stopButton" class="tertiary-button" type="button" style="padding: 4px 10px; font-size: 12px;" disabled>Stop</button>
          </div>
          <span id="selectionLabel" style="font-size: 11px; color: #64748b;">No block selected</span>
        </div>
        <canvas id="simulatorCanvas" width="800" height="400"></canvas>
      </div>
    </div>
  </section>

  <div id="missionControlModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.98); z-index: 9999; flex-direction: column;">
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #1e293b; border-bottom: 1px solid #334155;">
      <div>
        <span style="color: #38bdf8; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em;">Mission Control Room</span>
        <h2 style="color: #f8fafc; margin: 0; font-size: 22px;">Submarine Simulator</h2>
      </div>
      
      <div style="display: flex; gap: 10px; align-items: center;">
        <button id="modalStartButton" style="background: #22c55e; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">Start</button>
        <button id="modalPauseButton" style="background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;" disabled>Pause</button>
        <button id="modalStepButton" style="background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">Step</button>
        <button id="modalStopButton" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;" disabled>Stop</button>
        <span style="width: 2px; height: 25px; background: #475569; margin: 0 10px;"></span>
        <button id="exitMissionButton" style="background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;">Exit Simulator</button>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <span style="color: #94a3b8; font-size: 12px; text-transform: uppercase; font-weight: bold;">Executing:</span>
        <span id="modalSelectionLabel" style="background: #334155; color: #38bdf8; padding: 6px 14px; border-radius: 4px; font-family: monospace; font-size: 13px; font-weight: bold; border: 1px solid #475569;">No block running</span>
      </div>
    </header>

    <div style="flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #0c4a6e; overflow: hidden;">
      <div id="modalCanvasContainer" style="width: 95vw; height: 80vh; border: 4px solid #334155; border-radius: 8px; overflow: hidden; background: #0284c7;"></div>
    </div>
  </div>
</main>
